name = "reivo-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# KV namespace for budget state and loop detection
# Set your own KV namespace IDs here
[[kv_namespaces]]
binding = "BUDGET_KV"
id = "48329a7d34d94c24925470592eef9c7a"
preview_id = "314e368481a64e6292bad479102c832e"

[[kv_namespaces]]
binding = "USERS_KV"
id = "53c96e1637ed493c9f3e9ed1d1d89ad1"
preview_id = "816efdacc3d443a78c5d134455bc4d30"

# Secrets (set via `wrangler secret put`)
# TURSO_DATABASE_URL
# TURSO_AUTH_TOKEN
# ENCRYPTION_KEY
